# ────────────────────────────────────────────────────────────────────
# DFT Portal — PRODUCTION stack (Dokploy / self-hosted Docker host)
#
# Services:
#   app       — Next.js (built from ./Dockerfile), attached to dokploy-network
#                so Traefik (Dokploy's reverse proxy) can route HTTP traffic
#                to container port 3000.
#   postgres  — Postgres 16, persisted to the `dft_portal_pgdata` volume.
#                Kept on the internal `default` network only — never reachable
#                from Traefik or the host.
#
# Required environment variables (set in Dokploy or a .env file):
#   AUTH_SECRET           — 32-byte base64 (openssl rand -base64 32)
#   AUTH_URL              — public URL of the portal (e.g. https://dft.example.tr)
#   APP_URL               — same as AUTH_URL (used inside emails / links)
#   POSTGRES_PASSWORD     — strong DB password
#
# Optional:
#   RESEND_API_KEY, MAIL_FROM       — prod email delivery
#   MAX_UPLOAD_BYTES                — default 15 MB
#   ENABLE_PUBLIC_SIGNUP            — default "false" (closed system)
#   REQUIRE_ADMIN_APPROVAL          — default "true"
#
# Note on Traefik labels: this file intentionally does NOT hard-code the
# per-host Traefik router rules (they embed the Dokploy app slug and the
# domain). Dokploy's UI injects those labels onto the `app` service at
# deploy time — as long as `app` is attached to `dokploy-network` (see
# below), Dokploy targets the correct service.
#
# For local development run only the DB with:
#   pnpm db:up      (delegates to docker-compose.dev.yml)
# ────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dft-portal:latest
    container_name: dft-portal-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: "DFT Portal"
      APP_URL: ${APP_URL:?set APP_URL in env}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in env}
      AUTH_URL: ${AUTH_URL:?set AUTH_URL in env}
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: "postgresql://dft:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in env}@postgres:5432/dft_portal?schema=public"
      UPLOAD_DIR: /app/storage/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-15728640}
      ENABLE_PUBLIC_SIGNUP: ${ENABLE_PUBLIC_SIGNUP:-false}
      REQUIRE_ADMIN_APPROVAL: ${REQUIRE_ADMIN_APPROVAL:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-DFT Portal <no-reply@localhost>}
    # Dokploy / Traefik attaches to this container on port 3000 through the
    # internal docker network — we do NOT publish the port to the host
    # (which would collide with Dokploy's own panel and other apps).
    # The Dockerfile's `EXPOSE 3000` is still honoured.
    expose:
      - "3000"
    # NOTE: `/app/storage/uploads` mount'u Dokploy UI'ın
    # "General → Volumes" bölümünden tanımlandı (Mount Type: VOLUME,
    # Volume Name: tr33_dft_uploads). Tek bir kaynaktan yönetmek için
    # compose burada `volumes:` bildirmiyor. UI mount'u çıkarılırsa
    # buraya geri eklenebilir.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok||r.status===307||r.status===302?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      # `default` → reach postgres via the compose-internal network.
      # `dokploy-network` → be reachable by Traefik for public HTTPS.
      - default
      - dokploy-network

  postgres:
    image: postgres:16-alpine
    container_name: dft-portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in env}
      POSTGRES_DB: dft_portal
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - dft_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dft -d dft_portal"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    # Defensive opt-out: Dokploy sometimes injects Traefik labels onto
    # every service in a compose project. Explicit `traefik.enable=false`
    # guarantees Traefik will never route public HTTP traffic to this
    # container, even if it accidentally ends up on `dokploy-network`.
    labels:
      - "traefik.enable=false"
    # Intentionally NOT on dokploy-network — DB must never be reachable
    # through the reverse proxy. No host port binding either.

volumes:
  # Project-scoped volume names so we never share Postgres data with
  # another Dokploy app that happens to pick a similar slug.
  dft_pgdata:
    name: tr33_dft_pgdata
  # `tr33_dft_uploads` volume'ü artık Dokploy UI (General → Volumes)
  # üzerinden tanımlanıyor; compose burada bildirmiyor. Bu sayede
  # Dokploy mount'u kendi mekanizmasıyla her deploy'a aynı volume'le
  # bağlar — uploads klasörü sıfırlanmaz.

networks:
  # Dokploy creates this shared network out-of-band; Traefik joins it and
  # routes incoming HTTP(S) traffic to any container that advertises it.
  dokploy-network:
    external: true
